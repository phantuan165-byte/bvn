<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BVN - Dang nhap ton kho</title>
<style>
:root{color-scheme:dark;--bg:#07111f;--panel:#0f172a;--text:#e5e7eb;--muted:#94a3b8;--line:rgba(255,255,255,.12);--cyan:#22d3ee;--amber:#fbbf24;--red:#fca5a5}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 20% 20%,rgba(34,211,238,.18),transparent 28%),radial-gradient(circle at 80% 10%,rgba(251,191,36,.13),transparent 24%),linear-gradient(135deg,#07111f,#101827 55%,#111827);display:grid;place-items:center;padding:24px}.card{width:min(420px,100%);border:1px solid var(--line);border-radius:8px;padding:28px;background:rgba(15,23,42,.95);box-shadow:0 24px 80px rgba(0,0,0,.45)}h1{font-size:24px;margin:0 0 6px}p{font-size:13px;color:var(--muted);margin:0 0 22px}label{display:block;margin:14px 0 8px;color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase}input{width:100%;height:46px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.06);color:var(--text);padding:0 14px;outline:none}input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(34,211,238,.15)}button{width:100%;height:46px;margin-top:22px;border:0;border-radius:8px;color:#03111f;background:linear-gradient(135deg,var(--cyan),var(--amber));font-weight:800;cursor:pointer}.error{min-height:20px;margin-top:12px;color:var(--red);font-size:13px}.loading{display:none;color:var(--muted);font-size:13px;margin-top:14px}.is-loading .loading{display:block}.is-loading button{opacity:.75;cursor:wait}</style>
</head>
<body>
<form class="card" id="loginForm" autocomplete="off">
  <h1>Dang nhap BVN</h1>
  <p>Nhap tai khoan duoc cap de truy cap he thong ton kho.</p>
  <label for="user">Ten dang nhap</label>
  <input id="user" type="text" autocomplete="username" required autofocus>
  <label for="pass">Mat khau</label>
  <input id="pass" type="password" autocomplete="current-password" required>
  <button type="submit">Dang nhap</button>
  <div class="error" id="error" aria-live="polite"></div>
  <div class="loading">Dang tai he thong ton kho...</div>
</form>
<script>
const AUTH_USERNAME='phantuanbvn';
const AUTH_PASSWORD='bvn@1234';
const CHUNKS=["chunks/part00.txt","chunks/part01.txt","chunks/part02.txt","chunks/part03.txt","chunks/part04.txt","chunks/part05.txt","chunks/part06.txt","chunks/part07.txt","chunks/part08.txt","chunks/part09.txt","chunks/part10.txt","chunks/part11.txt","chunks/part12.txt"];
async function loadPackedHtml(){const parts=await Promise.all(CHUNKS.map(async url=>{const r=await fetch(url,{cache:'no-store'});if(!r.ok)throw new Error('Khong tai duoc du lieu he thong.');return r.text();}));return parts.join('');}
function b64ToBytes(value){const bin=atob(value);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return bytes;}
async function unpackHtml(value){if('DecompressionStream' in window){const stream=new Blob([b64ToBytes(value)]).stream().pipeThrough(new DecompressionStream('gzip'));return await new Response(stream).text();}throw new Error('Trinh duyet khong ho tro giai nen trang. Vui long dung Chrome, Edge hoac Firefox moi.');}
function withScrollPatch(html){const css=`<style id="bvn-scroll-patch">
.main-content{min-width:0!important}
#panel-import,#panel-export{min-width:0!important;max-width:calc(100vw - var(--sidebar-w,232px) - 64px)!important}
#panel-import .table-wrapper,#panel-export .table-wrapper{display:block!important;width:100%!important;max-width:calc(100vw - var(--sidebar-w,232px) - 64px)!important;overflow-x:auto!important;overflow-y:visible!important;padding-bottom:12px!important;scrollbar-gutter:stable both-edges;-webkit-overflow-scrolling:touch}
#panel-import .table-wrapper table,#panel-export .table-wrapper table{width:max-content!important;min-width:1560px!important}
.table-scroll-proxy{display:block;width:100%;max-width:calc(100vw - var(--sidebar-w,232px) - 64px);height:18px;overflow-x:auto;overflow-y:hidden;margin:10px 0 8px;border:1px solid rgba(148,163,184,.22);border-radius:8px;background:rgba(15,23,42,.72)}
.table-scroll-proxy-inner{height:1px}
.table-scroll-proxy::-webkit-scrollbar{height:12px}.table-scroll-proxy::-webkit-scrollbar-track{background:rgba(15,23,42,.9);border-radius:8px}.table-scroll-proxy::-webkit-scrollbar-thumb{background:linear-gradient(90deg,#22d3ee,#818cf8);border-radius:8px;border:2px solid rgba(15,23,42,.9)}
@media(max-width:980px){#panel-import,#panel-export,#panel-import .table-wrapper,#panel-export .table-wrapper,.table-scroll-proxy{max-width:calc(100vw - 32px)!important}}
</style>`;
const js=`<script id="bvn-scroll-patch-js">
(function(){function ensure(){[['importBody','importHistoryTable','Keo ngang bang lich su nhap kho'],['exportBody','exportHistoryTable','Keo ngang bang lich su xuat kho']].forEach(function(item){var body=document.getElementById(item[0]);if(!body)return;var wrap=body.closest('.table-wrapper');if(!wrap)return;wrap.id=item[1];var prev=wrap.previousElementSibling;if(!prev||!prev.classList||!prev.classList.contains('table-scroll-proxy')){var proxy=document.createElement('div');proxy.className='table-scroll-proxy';proxy.dataset.scrollTarget=item[1];proxy.setAttribute('aria-label',item[2]);var inner=document.createElement('div');inner.className='table-scroll-proxy-inner';proxy.appendChild(inner);wrap.parentNode.insertBefore(proxy,wrap)}});sync()}function sync(){document.querySelectorAll('.table-scroll-proxy[data-scroll-target]').forEach(function(proxy){var target=document.getElementById(proxy.dataset.scrollTarget);var inner=proxy.querySelector('.table-scroll-proxy-inner');if(!target||!inner)return;inner.style.width=Math.max(target.scrollWidth,target.clientWidth)+'px';if(proxy.dataset.bound==='1')return;proxy.dataset.bound='1';var lock=false;proxy.addEventListener('scroll',function(){if(lock)return;lock=true;target.scrollLeft=proxy.scrollLeft;lock=false});target.addEventListener('scroll',function(){if(lock)return;lock=true;proxy.scrollLeft=target.scrollLeft;lock=false})})}document.addEventListener('DOMContentLoaded',ensure);window.addEventListener('resize',sync);setInterval(ensure,1000)})();
<\/script>`;
return html.replace('</head>',css+'</head>').replace('</body>',js+'</body>');}
document.getElementById('loginForm').addEventListener('submit',async(e)=>{e.preventDefault();const form=e.currentTarget;const error=document.getElementById('error');const user=document.getElementById('user').value.trim();const pass=document.getElementById('pass').value;if(user!==AUTH_USERNAME||pass!==AUTH_PASSWORD){error.textContent='Sai ten dang nhap hoac mat khau.';document.getElementById('pass').value='';document.getElementById('pass').focus();return;}try{form.classList.add('is-loading');error.textContent='';document.open();document.write(withScrollPatch(await unpackHtml(await loadPackedHtml())));document.close();}catch(err){form.classList.remove('is-loading');error.textContent=err.message;}});
</script>
</body>
</html>
